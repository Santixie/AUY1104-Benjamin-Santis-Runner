apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo-api
  template:
    metadata:
      labels:
        app: demo-api
    spec:
      containers:
        - name: demo-api
          image: bnjmn265/demo-api:latest
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
